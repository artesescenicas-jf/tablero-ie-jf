<!DOCTYPE html>
<html lang="es-CO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tablero de Anuncios · IETI Julio Flórez</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700;1,900&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #e8e1d3; font-family: 'Inter', system-ui, sans-serif; min-height: 100vh; }
  #root { min-height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="data.js"></script>
<script src="sheets-connector.js"></script>
<script type="text/babel" src="variaciones/backstage.jsx"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "escuela": "IETI-JF",
  "densidad": "normal"
}/*EDITMODE-END*/;

const App = () => {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [data, setData] = React.useState(window.TABLERO_DATA);

  React.useEffect(() => {
    if (window.TABLERO_READY) {
      window.TABLERO_READY.then(d => setData({ ...d }));
    }
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const liveData = { ...data, escuela: tweaks.escuela };

  return (
    <>
      <Backstage data={liveData} />
      {tweaksOpen && <TweaksPanel tweaks={tweaks} setTweak={setTweak} onClose={() => setTweaksOpen(false)} />}
    </>
  );
};

const TweaksPanel = ({ tweaks, setTweak, onClose }) => (
  <div style={{
    position: 'fixed', bottom: 20, right: 20, width: 300,
    background: '#fff9ee', border: '1.5px solid #2B2A6E',
    boxShadow: '6px 6px 0 rgba(43,42,110,0.2), 0 20px 40px rgba(0,0,0,0.15)',
    zIndex: 9999, fontFamily: 'Inter, sans-serif', fontSize: 13,
    padding: 18
  }}>
    <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14, paddingBottom: 10, borderBottom: '1px dashed #2B2A6E' }}>
      <div style={{ fontFamily: '"Playfair Display", serif', fontStyle: 'italic', fontSize: 18, fontWeight: 700, color: '#2B2A6E' }}>
        Tweaks
      </div>
      <button onClick={onClose} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18 }}>×</button>
    </div>

    <label style={{ display: 'block', marginBottom: 12 }}>
      <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.2em', textTransform: 'uppercase', color: '#5a5244', marginBottom: 4 }}>
        Nombre corto
      </div>
      <input type="text" value={tweaks.escuela} onChange={e => setTweak('escuela', e.target.value)}
        style={{ width: '100%', padding: '6px 8px', border: '1px solid #2B2A6E', background: '#fff', fontFamily: 'inherit', fontSize: 13, boxSizing: 'border-box' }} />
    </label>

    <div style={{ marginTop: 14, padding: 10, background: '#f4f0e6', fontFamily: 'JetBrains Mono, monospace', fontSize: 10, lineHeight: 1.6, color: '#5a5244' }}>
      Para editar avisos y links: modifica <b>data.js</b> o conecta a Google Sheets (ver <b>README-GoogleSheets.md</b>).
    </div>
  </div>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
